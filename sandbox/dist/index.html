<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flux Extension Sandbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-CbpfdFeZ.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CsFRWUJY.css">
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Vite app loads here - React is bundled inside -->
    
    <!-- After Vite loads, expose React/lucide for extension bundles -->
    <script>
      // Wait for Vite to load React
      function waitForReact(callback, attempts = 0) {
        if (attempts > 50) {
          console.error('React not loaded after 5 seconds');
          return;
        }
        if (window.React && window.ReactDOM) {
          callback();
        } else {
          setTimeout(() => waitForReact(callback, attempts + 1), 100);
        }
      }
      
      waitForReact(() => {
        // Make React available globally for extension bundles
        window.React = window.React || window.React;
        window.ReactDOM = window.ReactDOM || window.ReactDOM;
        
        // Try to get lucide from the Vite bundle
        // lucide-react might be imported in the app, so let's check
        if (window.lucideReact) {
          window.lucideReact = window.lucideReact;
        } else if (window.LucideReact) {
          window.lucideReact = window.LucideReact;
        }
        
        console.log('[Sandbox] React loaded and exposed globally');
      });
    </script>
  </body>
</html>
