<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Flux Extension Sandbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sb: {
                            primary: '#0a0a0f',
                            secondary: '#12121a',
                            tertiary: '#1a1a26',
                            elevated: '#22222e',
                            border: '#2a2a3a',
                            'border-hover': '#3a3a4e',
                            'text-primary': '#e8e8f0',
                            'text-secondary': '#9898aa',
                            'text-muted': '#5a5a6e',
                            accent: '#8b5cf6',
                            'accent-hover': '#7c3aed',
                            'accent-glow': 'rgba(139, 92, 246, 0.15)',
                            'user-bubble': '#1e3a5f',
                            'bot-bubble': '#1e1e2e',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="/styles.css" rel="stylesheet">

</head>

<body class="font-sans bg-sb-primary text-sb-text-primary h-screen flex overflow-hidden">
    <!-- Sidebar Navigation -->
    <div class="w-[220px] bg-sb-secondary border-r border-sb-border flex flex-col flex-shrink-0">
        <div class="p-5 px-4 border-b border-sb-border flex items-center gap-2.5">
            <img id="ext-icon" src="/icon.png" alt="Icon" class="w-8 h-8 rounded-lg bg-sb-tertiary"
                onerror="this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='">
            <div class="overflow-hidden">
                <div id="ext-name" class="font-bold text-sm truncate">Loading…</div>
                <div id="ext-slug" class="text-[11px] text-sb-text-muted">sandbox</div>
            </div>
        </div>
        <div class="flex-1 p-3 px-2 flex flex-col gap-0.5">
            <div class="nav-item active" data-target="chat-content">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" class="w-4 h-4 flex-shrink-0">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
                Chat
            </div>
            <div class="nav-item" data-target="ui-mount">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" class="w-4 h-4 flex-shrink-0">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <path d="M3 9h18" />
                    <path d="M9 21V9" />
                </svg>
                App UI
            </div>
            <div class="nav-item" data-target="settings-mount">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" class="w-4 h-4 flex-shrink-0">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                </svg>
                App Settings
            </div>
            <div class="h-px bg-sb-border mx-3 my-2"></div>
            <div class="px-3 py-1 text-[10px] uppercase tracking-widest text-sb-text-muted font-semibold">Developer
            </div>
            <div class="nav-item" data-target="storage-mount">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" class="w-4 h-4 flex-shrink-0">
                    <ellipse cx="12" cy="5" rx="9" ry="3" />
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" />
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" />
                </svg>
                Storage
            </div>
            <div class="nav-item" data-target="users-mount">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" class="w-4 h-4 flex-shrink-0">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
                Users
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col overflow-hidden min-w-0">
        <!-- Chat Tab -->
        <div id="chat-content" class="tab-content active relative">
            <div id="chat" class="flex-1 overflow-y-auto p-5 flex flex-col gap-2 scrollbar-thin">
                <div class="message bot">
                    <div class="text-[11px] text-sb-text-muted mb-1 font-semibold">Sandbox System</div>
                    <div class="whitespace-pre-wrap break-words text-sm leading-relaxed">Welcome to the local development sandbox. Type a message below to test your extension's onMessage handler.</div>
                </div>
            </div>
            <div id="mention-picker"></div>
            <div id="command-picker"></div>
            <div class="p-4 px-5 bg-sb-secondary border-t border-sb-border flex gap-2.5 items-end">
                <textarea id="msg-input" placeholder="Type a message to the channel…" rows="1"
                    class="flex-1 px-3.5 py-2.5 rounded-xl border border-sb-border bg-sb-tertiary text-sb-text-primary outline-none text-sm resize-none transition-colors focus:border-sb-accent"></textarea>
                <button id="send-btn" class="btn-accent">Send</button>
            </div>
        </div>

        <!-- App UI Tab -->
        <div id="ui-mount" class="tab-content overflow-y-auto h-full"></div>

        <!-- Settings UI Tab -->
        <div id="settings-mount" class="tab-content overflow-y-auto h-full"></div>

        <!-- Storage Tab -->
        <div id="storage-mount" class="tab-content">
            <div class="flex-1 p-6 flex flex-col gap-5 min-h-0">
                <div class="flex items-center justify-between flex-shrink-0">
                    <h2 class="text-lg font-bold flex items-center gap-2">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-sb-accent">
                            <ellipse cx="12" cy="5" rx="9" ry="3" />
                            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" />
                            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" />
                        </svg>
                        Storage Editor
                    </h2>
                    <div class="flex gap-2">
                        <button id="refresh-storage-btn" class="btn-blue text-xs">↻ Refresh</button>
                        <button id="save-storage-btn" class="btn-green text-xs">✓ Save</button>
                    </div>
                </div>
                <div
                    class="bg-sb-secondary border border-sb-border rounded-xl overflow-hidden flex-1 min-h-0 flex flex-col">
                    <div id="jsoneditor-container" class="flex-1 min-h-0"></div>
                </div>
            </div>
        </div>

        <!-- Users Tab -->
        <div id="users-mount" class="tab-content">
            <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-5 scrollbar-thin">
                <h2 class="text-lg font-bold flex items-center gap-2">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="w-5 h-5 text-sb-accent">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    Users Manager
                </h2>

                <!-- Current User -->
                <div class="bg-sb-secondary border border-sb-border rounded-xl overflow-hidden">
                    <div class="px-5 py-4 border-b border-sb-border">
                        <div class="text-sm font-semibold text-sb-text-secondary">Active User</div>
                    </div>
                    <div class="px-5 py-4 flex items-center gap-3">
                        <select id="current-user-select"
                            class="bg-sb-tertiary border border-sb-border text-sb-text-primary px-3 py-2 rounded-lg text-sm outline-none cursor-pointer min-w-[220px] focus:border-sb-accent"></select>
                        <span class="text-xs text-sb-text-muted">Sends messages & passed as currentUserId</span>
                    </div>
                </div>

                <!-- Users List -->
                <div class="bg-sb-secondary border border-sb-border rounded-xl overflow-hidden">
                    <div class="px-5 py-4 border-b border-sb-border">
                        <div class="text-sm font-semibold text-sb-text-secondary">All Users</div>
                    </div>
                    <div class="px-5 py-4 flex flex-col gap-2">
                        <div id="users-list" class="flex flex-col gap-2"></div>
                        <div
                            class="flex gap-2 items-center p-3 px-4 bg-sb-tertiary border border-dashed border-sb-border rounded-lg mt-2">
                            <input type="text" id="new-user-name" placeholder="Name"
                                class="flex-1 px-3 py-2 bg-sb-primary border border-sb-border rounded-lg text-sb-text-primary text-sm outline-none focus:border-sb-accent" />
                            <input type="text" id="new-user-avatar" placeholder="Avatar URL (optional)"
                                class="flex-1 px-3 py-2 bg-sb-primary border border-sb-border rounded-lg text-sb-text-primary text-sm outline-none focus:border-sb-accent" />
                            <button id="add-user-btn" class="btn-accent text-xs">+ Add</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- React dependencies for extension UI -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/lucide-react@0.330.0/dist/umd/lucide-react.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Sandbox scripts -->
    <script src="/require-shim.js"></script>
    <script src="/json-editor.js"></script>
    <script src="/sandbox.js"></script>
</body>

</html>
